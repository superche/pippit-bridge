name: Plugin contract and version

on:
  pull_request:
  push:
    branches: [main]

jobs:
  contract:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22.22.2, 24.15.0]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm install --global npm@12.0.1
      - run: npm ci
      - run: npm run check:plugin-version
      - run: npm run check:plugin-contract
      - run: npm run check
      - run: npm run check:release-artifact
      - run: npm run check:dev-gateway

  windows-contract-only:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm
      - run: npm install --global npm@12.0.1
      - run: npm ci
      - run: npm run check
      - name: Record launcher boundary
        shell: pwsh
        run: Write-Output "Native Windows Codex launch is unsupported while .mcp.json requires /bin/sh."
