<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pippit video regeneration</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      font-synthesis: none;
    }
    * { box-sizing: border-box; }
    body {
      min-width: 0;
      margin: 0;
      padding: 24px;
      background: #f5f5f7;
      color: #1d1d1f;
      font-size: 17px;
      letter-spacing: -.022em;
      line-height: 1.47;
      -webkit-font-smoothing: antialiased;
    }
    :root[data-theme="dark"] {
      color-scheme: dark;
      background: #1d1d1f;
      color: #f5f5f7;
    }
    :root[data-theme="dark"] body {
      background: #1d1d1f;
      color: #f5f5f7;
    }
    button, input, textarea { font: inherit; }
    button {
      min-width: 44px;
      min-height: 44px;
      border: 1px solid #0066cc;
      border-radius: 999px;
      padding: 11px 22px;
      background: transparent;
      color: #0066cc;
      cursor: pointer;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      transition: background-color 160ms ease, color 160ms ease, transform 120ms ease;
    }
    button:hover:not(:disabled) { background: #fafafc; }
    button:active:not(:disabled) { transform: scale(.95); }
    button:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 2px solid #0071e3;
      outline-offset: 2px;
    }
    button:disabled, input:disabled, textarea:disabled { cursor: default; opacity: .5; }
    input[type="range"] {
      min-height: 44px;
      margin: 0;
      accent-color: #0066cc;
      cursor: pointer;
    }
    main {
      display: grid;
      width: min(100%, 960px);
      margin: 0 auto;
      gap: 17px;
    }
    header, .toolbar, .playback, .annotation-toolbar, .submit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hero { padding: 8px 4px 4px; }
    .title-copy { display: grid; gap: 4px; }
    .eyebrow {
      margin: 0;
      color: #6e6e73;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      line-height: 16px;
      text-transform: uppercase;
    }
    h1, h2 { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 600;
      letter-spacing: -.025em;
      line-height: 1.08;
    }
    h2 { margin: 0; font-size: 21px; font-weight: 600; letter-spacing: -.012em; line-height: 1.2; }
    .status {
      max-width: 50%;
      overflow: hidden;
      border: 1px solid #e0e0e0;
      border-radius: 999px;
      padding: 8px 12px;
      background: #ffffff;
      color: #6e6e73;
      font-size: 12px;
      line-height: 16px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status.completed { border-color: #0066cc; background: #0066cc; color: #ffffff; }
    .status.failed, .status.cancelled, .status.expired { border-color: #1d1d1f; color: #1d1d1f; }
    .summary, .utility-card {
      border: 1px solid #e0e0e0;
      border-radius: 18px;
      background: #ffffff;
    }
    .summary { display: grid; gap: 12px; padding: 17px 24px; }
    dl { display: grid; grid-template-columns: minmax(62px, auto) 1fr; gap: 8px 12px; margin: 0; font-size: 12px; line-height: 17px; }
    dt { color: #6e6e73; }
    dd { min-width: 0; margin: 0; overflow-wrap: anywhere; }
    .message, .hint, .error { margin: 0; font-size: 12px; line-height: 1.47; }
    .message, .hint { color: #6e6e73; }
    .error { border-left: 2px solid #0066cc; padding-left: 8px; color: #1d1d1f; }
    .editor { display: grid; gap: 17px; }
    .viewer-card {
      overflow: hidden;
      border: 1px solid #272729;
      border-radius: 18px;
      background: #272729;
      color: #ffffff;
    }
    .video-stage {
      position: relative;
      overflow: hidden;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000000;
      touch-action: auto;
    }
    .video-stage.annotating { touch-action: none; }
    video { display: block; width: 100%; height: 100%; object-fit: contain; background: #000000; }
    .roi-layer { position: absolute; inset: 0; pointer-events: none; }
    .roi-layer.active { pointer-events: auto; cursor: crosshair; }
    .roi-layer:focus-visible { outline: 2px solid #2997ff; outline-offset: -4px; }
    .roi-box {
      position: absolute;
      display: none;
      border: 2px solid #2997ff;
      border-radius: 5px;
      background: rgb(41 151 255 / 16%);
      pointer-events: none;
    }
    .playback { justify-content: flex-start; padding: 12px 17px; }
    .viewer-card button { border-color: #2997ff; color: #2997ff; }
    .viewer-card button:hover:not(:disabled) { background: rgb(255 255 255 / 8%); }
    .viewer-card input[type="range"] { accent-color: #2997ff; }
    .playback input[type="range"] { flex: 1 1 180px; min-width: 120px; }
    .time { min-width: 96px; color: #cccccc; font-variant-numeric: tabular-nums; font-size: 12px; }
    .utility-card { display: grid; gap: 17px; padding: 24px; }
    .section-heading { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .section-title { display: grid; gap: 4px; }
    .timeline-wrap { display: grid; gap: 8px; }
    .timeline {
      position: relative;
      height: 64px;
      overflow: hidden;
      border: 1px solid #e0e0e0;
      border-radius: 11px;
      background: #fafafc;
    }
    .timeline-shade { position: absolute; inset-block: 0; background: #e0e0e0; }
    .timeline-selection {
      position: absolute;
      inset-block: 0;
      border: 2px solid #0066cc;
      border-radius: 8px;
      background: rgb(0 102 204 / 10%);
      pointer-events: none;
    }
    .timeline-selection::before, .timeline-selection::after {
      content: "";
      position: absolute;
      top: 16px;
      width: 2px;
      height: 28px;
      border-radius: 2px;
      background: #0066cc;
    }
    .timeline-selection::before { left: 8px; }
    .timeline-selection::after { right: 8px; }
    .range-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 17px; }
    .range-field { display: grid; gap: 4px; color: #6e6e73; font-size: 12px; line-height: 17px; }
    .range-field input { width: 100%; }
    .annotation-toolbar { align-items: stretch; }
    .comment-input { display: flex; flex: 1 1 280px; gap: 8px; }
    .comment-input input, textarea {
      width: 100%;
      border: 1px solid #e0e0e0;
      background: #ffffff;
      color: #1d1d1f;
      font-size: 14px;
      line-height: 20px;
    }
    .comment-input input { min-height: 44px; border-radius: 999px; padding: 11px 20px; }
    textarea { min-height: 112px; border-radius: 11px; padding: 14px 17px; resize: vertical; }
    input::placeholder, textarea::placeholder { color: #6e6e73; opacity: 1; }
    .annotation-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .annotation-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      max-width: 100%;
      min-height: 44px;
      border: 1px solid #e0e0e0;
      border-radius: 999px;
      padding: 0 4px 0 8px;
      background: #fafafc;
      font-size: 12px;
    }
    .annotation-chip > button { min-width: 44px; min-height: 44px; border: 0; padding: 0 8px; background: transparent; }
    .annotation-chip .chip-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .primary { min-height: 44px; border-color: #0066cc; background: #0066cc; color: #ffffff; }
    .primary:hover:not(:disabled) { border-color: #0071e3; background: #0071e3; }
    .annotation-active { border-color: #0066cc; background: #0066cc; color: #ffffff; }
    .instruction-field { display: grid; gap: 8px; }
    .submit-row { align-items: flex-start; }
    .submit-copy { display: grid; gap: 4px; flex: 1 1 260px; }
    .toolbar { justify-content: flex-end; padding: 0 4px 8px; }
    [hidden] { display: none !important; }

    @media (max-width: 640px) {
      body { padding: 12px; }
      main, .editor { gap: 12px; }
      .hero { padding-inline: 4px; }
      .utility-card { gap: 12px; padding: 17px; }
      .summary { padding: 17px; }
      .annotation-toolbar { display: grid; }
      .comment-input { width: 100%; }
    }

    @media (max-width: 480px) {
      body { padding: 8px; }
      .hero { align-items: flex-start; }
      .status { max-width: 44%; }
      .range-grid { grid-template-columns: 1fr; }
      .comment-input { display: grid; }
      .comment-input button, .submit-row .primary { width: 100%; }
      .submit-row { display: grid; }
      .playback { display: grid; grid-template-columns: auto 1fr; }
      .playback input[type="range"] { grid-column: 1 / -1; grid-row: 1; width: 100%; }
      .playback .time { justify-self: end; }
    }

    @media (prefers-reduced-motion: reduce) {
      button { transition: none; }
      button:active:not(:disabled) { transform: none; }
    }

    .loading-view {
      display: grid;
      min-height: 300px;
      place-content: center;
      justify-items: center;
      gap: 22px;
      text-align: center;
    }
    .loading-status {
      margin: 0;
      color: #6e6e73;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -.01em;
      line-height: 20px;
    }
    .infinity-loader {
      display: grid;
      grid-template-columns: repeat(5, 8px);
      grid-template-rows: repeat(5, 8px);
      gap: 6px;
      width: 64px;
      height: 64px;
      place-content: center;
      color: #1d1d1f;
    }
    .infinity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: .08;
      transition: opacity 40ms linear;
    }
    :root[data-theme="dark"] .loading-status { color: #a1a1a6; }
    :root[data-theme="dark"] .infinity-loader { color: #f5f5f7; }
    .terminal-view {
      --error-surface: #ffffff;
      --error-foreground: #1d1d1f;      display: grid;
      min-height: 268px;
      place-content: center;
      justify-items: center;
      overflow: hidden;
      padding: 32px;
      background: var(--error-surface);
      color: var(--error-foreground);
      text-align: center;
    }
    :root[data-theme="dark"] .terminal-view {
      --error-surface: #1d1d1f;
      --error-foreground: #f5f5f7;
      color-scheme: dark;
    }
    :root[data-widget-view="terminal"],
    :root[data-widget-view="terminal"] body {
      min-height: 100%;
      background: #ffffff;
    }
    :root[data-widget-view="terminal"] body { padding: 0; }
    :root[data-widget-view="terminal"] main {
      width: 100%;
      max-width: none;
      min-height: 100vh;
      margin: 0;
      gap: 0;
    }
    :root[data-widget-view="terminal"] .terminal-view { min-height: max(268px, 100vh); }
    :root[data-theme="dark"][data-widget-view="terminal"],
    :root[data-theme="dark"][data-widget-view="terminal"] body {
      background: #1d1d1f;
    }
    :root[data-widget-view="editor"] body { padding: 0; }
    :root[data-widget-view="editor"] main {
      width: 100%;
      max-width: none;
      gap: 0;
    }
    :root[data-widget-view="editor"] .editor { gap: 0; padding: 0; }
    :root[data-widget-view="editor"] .viewer-card {
      margin: 0;
      border: 0;
      border-radius: 0;
    }
    .error-lockup {
      display: grid;
      justify-items: center;
      gap: 24px;
    }
    .error-word {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(7px, 1.5vw, 12px);
      margin: 0;
    }
    .error-matrix {
      display: grid;
      grid-template-columns: repeat(5, clamp(4px, .75vw, 7px));
      grid-auto-rows: clamp(4px, .75vw, 7px);
      gap: clamp(2px, .42vw, 4px);
    }
    .error-mark {
      grid-template-columns: repeat(7, 7px);
      grid-auto-rows: 7px;
      gap: 4px;
    }
    .error-dot {
      border-radius: 50%;
      background: currentColor;
      opacity: .07;
      transform-origin: center;
    }
    .error-dot.is-active { opacity: .94; }
    .terminal-view.is-entering .error-dot.is-active {
      animation: error-dot-entry 560ms steps(2, end) both;
      animation-delay: var(--error-dot-delay);
    }
    @keyframes error-dot-entry {
      0%, 22% { opacity: .07; transform: scale(.72); }
      36% { opacity: .94; transform: scale(1); }
      49% { opacity: .18; transform: scale(.82); }
      64%, 100% { opacity: .94; transform: scale(1); }
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) .terminal-view {
        --error-surface: #1d1d1f;
        --error-foreground: #f5f5f7;
        --error-border: #3a3a3c;
        color-scheme: dark;
      }
    }
    .viewer-card { position: relative; border: 0; border-radius: 0; }
    .video-stage { border-radius: 0; }
    video { position: relative; z-index: 0; }
    .roi-layer { z-index: 2; }
    .roi-box { border-color: #ffd60a; background: rgb(255 214 10 / 18%); }
    .viewer-card .annotation-trigger {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 3;
      display: grid;
      width: 44px;
      min-width: 44px;
      height: 44px;
      min-height: 44px;
      place-items: center;
      border: 1px solid rgb(255 255 255 / 32%);
      padding: 0;
      background: rgb(29 29 31 / 78%);
      color: #ffffff;
    }
    .viewer-card .annotation-trigger:hover:not(:disabled) { background: rgb(29 29 31 / 92%); }
    .annotation-trigger svg { width: 20px; height: 20px; pointer-events: none; }
    .viewer-card .annotation-trigger.annotation-active { border-color: #ffd60a; background: #ffd60a; color: #1d1d1f; }
    .viewer-message { margin: 0; padding: 10px 14px; color: #cccccc; font-size: 12px; }
    .annotation-panel {
      overflow: hidden;
      border: 0;
      border-radius: 0;
      background: #f7f7f8;
      box-shadow: inset 0 1px rgb(29 29 31 / 10%);
    }
    .annotation-panel summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 16px 28px 12px;
      cursor: pointer;
      list-style: none;
      transition: background-color 160ms ease;
    }
    .annotation-panel summary:hover { background: rgb(29 29 31 / 4%); }
    .annotation-panel summary::-webkit-details-marker { display: none; }
    .annotation-summary-line { display: flex; align-items: baseline; min-width: 0; gap: 12px; }
    .annotation-title { flex: 0 0 auto; font-size: 16px; font-weight: 700; letter-spacing: -.01em; }
    .annotation-summary {
      overflow: hidden;
      color: #6e6e73;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .annotation-chevron { width: 20px; height: 20px; color: #6e6e73; transition: transform 160ms ease; }
    .annotation-panel[open] .annotation-chevron { transform: rotate(180deg); }
    .annotation-composer {
      display: grid;
      grid-template-columns: minmax(0, .95fr) minmax(320px, 1.05fr);
      gap: clamp(24px, 3vw, 40px);
      padding: 8px 28px 24px;
    }
    .time-editor, .intent-editor { min-width: 0; }
    .range-impact {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      max-width: 100%;
      margin: 0;
      border: 1px solid #ffe47a;
      border-radius: 6px;
      padding: 5px 9px;
      background: #fff9db;
      color: #594a00;
      font-size: 12px;
      line-height: 1.4;
    }
    .range-impact strong { font-weight: 700; }
    #selection-label { font-variant-numeric: tabular-nums; }
    .trim-timeline {
      position: relative;
      height: 68px;
      margin: 16px 22px 8px;
      border-radius: 8px;
      background: #272729;
      box-shadow: 0 8px 24px rgb(0 0 0 / 10%);
      touch-action: none;
      user-select: none;
    }
    .filmstrip {
      position: absolute;
      inset: 0;
      display: grid;
      overflow: hidden;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      border-radius: 7px;
      background: #3a3a3c;
    }
    .filmstrip-frame {
      min-width: 0;
      border-right: 1px solid rgb(255 255 255 / 18%);
      background-color: #48484a;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }
    .filmstrip-frame:last-child { border-right: 0; }
    .trim-shade {
      position: absolute;
      z-index: 1;
      inset-block: 0;
      background: rgb(0 0 0 / 62%);
      pointer-events: none;
    }
    .trim-selection {
      position: absolute;
      z-index: 2;
      inset-block: 0;
      border-block: 3px solid #ffd60a;
      pointer-events: none;
    }
    .trim-handle {
      position: absolute;
      z-index: 3;
      top: -3px;
      width: 44px;
      min-width: 44px;
      height: 74px;
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0;
      background: transparent;
      color: #1d1d1f;
      cursor: ew-resize;
      transform: translateX(-50%);
    }
    .trim-handle:hover:not(:disabled), .trim-handle:active:not(:disabled) { background: transparent; transform: translateX(-50%); }
    .trim-handle::before {
      content: "";
      position: absolute;
      inset-block: 0;
      left: 13px;
      width: 18px;
      border-radius: 7px;
      background: #ffd60a;
    }
    .trim-handle::after {
      content: "";
      position: absolute;
      top: 29px;
      left: 20px;
      width: 4px;
      height: 16px;
      border-radius: 2px;
      background: #1d1d1f;
    }
    .range-note { display: flex; justify-content: space-between; gap: 12px; margin: 0; color: #6e6e73; font-size: 11px; }
    .range-note strong { color: #3a3a3c; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .intent-editor { display: flex; flex-direction: column; }
    .intent-label { display: flex; align-items: center; justify-content: space-between; gap: 12px; min-height: 28px; margin-bottom: 8px; }
    .intent-label label { color: #6e6e73; font-size: 11px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; }
    .area-status {
      border: 1px solid #d6d6db;
      border-radius: 6px;
      padding: 4px 8px;
      color: #6e6e73;
      font-size: 11px;
      font-weight: 600;
      line-height: 16px;
    }
    .area-status.is-selected { color: #267a34; }
    .intent-editor textarea { flex: 1; min-height: 132px; border-radius: 12px; resize: none; }
    .annotation-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border-top: 1px solid #ececf0;
      padding: 20px 28px 24px;
      background: transparent;
    }
    .annotation-footer .primary { flex: 0 0 auto; min-width: 190px; }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    :root[data-theme="dark"] button:hover:not(:disabled) { background: rgb(255 255 255 / 8%); }
    :root[data-theme="dark"] .primary {
      border-color: #2997ff;
      background: #2997ff;
      color: #ffffff;
    }
    :root[data-theme="dark"] .primary:hover:not(:disabled) { background: #409cff; }
    :root[data-theme="dark"] .eyebrow,
    :root[data-theme="dark"] dt,
    :root[data-theme="dark"] .message,
    :root[data-theme="dark"] .hint,
    :root[data-theme="dark"] .range-field,
    :root[data-theme="dark"] .annotation-summary,
    :root[data-theme="dark"] .annotation-chevron,
    :root[data-theme="dark"] .range-note,
    :root[data-theme="dark"] .intent-label label,
    :root[data-theme="dark"] .area-status { color: #a1a1a6; }
    :root[data-theme="dark"] .status,
    :root[data-theme="dark"] .summary,
    :root[data-theme="dark"] .utility-card {
      border-color: #3a3a3c;
      background: #2c2c2e;
    }
    :root[data-theme="dark"] .annotation-panel {
      background: #141517;
      box-shadow: inset 0 1px rgb(255 255 255 / 9%);
    }
    :root[data-theme="dark"] .annotation-panel summary:hover { background: rgb(255 255 255 / 4%); }
    :root[data-theme="dark"] .status { color: #a1a1a6; }
    :root[data-theme="dark"] .status.completed {
      border-color: #2997ff;
      background: #2997ff;
      color: #ffffff;
    }
    :root[data-theme="dark"] .status.failed,
    :root[data-theme="dark"] .status.cancelled,
    :root[data-theme="dark"] .status.expired { border-color: #a1a1a6; color: #f5f5f7; }
    :root[data-theme="dark"] .error { border-color: #2997ff; color: #f5f5f7; }
    :root[data-theme="dark"] .timeline {
      border-color: #3a3a3c;
      background: #1d1d1f;
    }
    :root[data-theme="dark"] .timeline-shade { background: #3a3a3c; }
    :root[data-theme="dark"] .comment-input input,
    :root[data-theme="dark"] textarea {
      border-color: #48484a;
      background: #1c1d1f;
      color: #f5f5f7;
    }
    :root[data-theme="dark"] input::placeholder,
    :root[data-theme="dark"] textarea::placeholder { color: #a1a1a6; }
    :root[data-theme="dark"] .range-note strong { color: #d1d1d6; }
    :root[data-theme="dark"] .range-impact { border-color: #75600c; background: #242109; color: #f2df83; }

          void requestDisplayMode("inline");
          var result = await editRequest;
          if (!result || result.isError) {
            if (result && editFailureIsDefinitive(result)) {
              editIdempotencyAttempt += 1;
              editIdempotencyKey = undefined;
            }
            showEditor();
            setEditError(toolErrorText(result));
            return;
          }
          var regeneratedJob = findJob(result.structuredContent, 0);
          if (!regeneratedJob) {
            showEditor();
            setEditError("Pippit returned an invalid regeneration result.");
            return;
          }
          annotations = [];
          instructionElement.value = "";
          editIdempotencyAttempt = 0;
          editIdempotencyKey = undefined;
          setAnnotationMode(false);
          renderAnnotations();
          void widgetController.persistActiveJobId(regeneratedJob.id).catch(function () {});
          render(result, true);
        } catch (error) {
          showEditor();
          setEditError(error instanceof Error ? error.message : String(error));
        } finally {
          submitting = false;
          submitEditElement.textContent = "Regenerate video";
          updateSubmitState();
        }
      }

      async function requestDisplayMode(mode) {
        var selectedMode = await widgetController.requestDisplayMode(mode, protocolReady);
        if (selectedMode) hostContext.displayMode = selectedMode;
      }

      function requestFullscreen() {
        return requestDisplayMode("fullscreen");
      }

      function useOpenAiInitialResult() {
        applyWidgetTheme();
        var bootstrap = readOpenAiWidgetBootstrap(window.openai);
        if (bootstrap) renderBootstrapResult(bootstrap);
      }

      function teardown() {
        var effects = dispatchWidgetEvent({ type: "destroy" });
        previewLoader.teardown(function (url) { URL.revokeObjectURL(url); });
        applyWidgetEffects(effects);
        if (resizeObserver) resizeObserver.disconnect();
        if (themeMediaQuery && typeof themeMediaQuery.removeEventListener === "function") {
          themeMediaQuery.removeEventListener("change", handleSystemThemeChange);
        }
        window.clearTimeout(terminalEntryTimer);
        window.clearTimeout(fallbackTimer);
        clearPollTimer();
        clearPreviewRenewal();
        window.clearTimeout(previewRetryTimer);
        window.clearTimeout(latestResolutionRetryTimer);
        window.clearTimeout(latestRestoreTimer);
        stopInfinityLoader();
        filmstripGeneration += 1;
        requestManager.cancelAll(new Error("Widget was closed."));
        videoElement.pause();
        videoElement.removeAttribute("src");
        videoElement.load();
      }

      window.addEventListener("message", function (event) {
        if (event.source !== window.parent || !event.data || event.data.jsonrpc !== "2.0") return;
        var message = event.data;
        if (message.method === "ui/resource-teardown" && message.id !== undefined) {
          teardown();
          window.parent.postMessage({ jsonrpc: "2.0", id: message.id, result: {} }, "*");
          return;
        }
        if (message.id !== undefined && requestManager.settle(
          message.id,
          message.result,
          message.error ? message.error.message || "Host request failed" : undefined
        )) return;
        if (message.method === "ui/notifications/host-context-changed") {
          var nextHostContext = message.params && typeof message.params === "object" ? message.params : {};
          hostContext = Object.assign({}, hostContext, nextHostContext);
          applyWidgetTheme();
          return;
        }
        if (message.method === "ui/notifications/tool-result") renderBootstrapResult(message.params);
      });

      for (var loaderIndex = 0; loaderIndex < 25; loaderIndex += 1) {
        var loaderDot = document.createElement("span");
        loaderDot.className = "infinity-dot";
        infinityLoaderElement.appendChild(loaderDot);
        loaderDots.push(loaderDot);
      }
      var errorDotIndex = 0;
      document.querySelectorAll(".error-matrix").forEach(function (matrix) {
        var pattern = matrix.getAttribute("data-pattern");
        if (!pattern) return;
        pattern.replaceAll("/", "").split("").forEach(function (value) {
          var dot = document.createElement("span");
          dot.className = "error-dot" + (value === "1" ? " is-active" : "");
          dot.style.setProperty("--error-dot-delay", String((errorDotIndex % 19) * 12) + "ms");
          matrix.appendChild(dot);
          errorDotIndex += 1;
        });
      });
      applyWidgetTheme();
      if (themeMediaQuery && typeof themeMediaQuery.addEventListener === "function") {
        themeMediaQuery.addEventListener("change", handleSystemThemeChange);
      }
      startInfinityLoader();

      window.addEventListener("openai:set_globals", useOpenAiInitialResult, { passive: true });
      videoElement.addEventListener("loadedmetadata", handleLoadedMetadata);
      videoElement.addEventListener("error", function () {
        if (activePreviewMedia && typeof activePreviewMedia.resource_uri === "string") {
          localPreviewFailed();
          return;
        }
        dispatchWidgetEvent({ type: "preview-failed" });
        previewLoadKind = undefined;
        draftBeforeMediaRefresh = undefined;
        clearPreviewRenewal();
        if (activeJobId && activePreviewMedia && typeof activePreviewMedia.url === "string" && previewRetryCount < 1) {
          previewRetryCount += 1;
          mediaMessageElement.textContent = "Retrying the local video…";
          mediaMessageElement.hidden = false;
          window.clearTimeout(previewRetryTimer);
          previewRetryTimer = window.setTimeout(function () {
            previewRetryTimer = undefined;
            if (destroyed || !activePreviewMedia || typeof activePreviewMedia.url !== "string") return;
            videoElement.src = activePreviewMedia.url;
            videoElement.load();
          }, 500);
        } else {
          mediaMessageElement.textContent = "The video preview could not be loaded.";
          mediaMessageElement.hidden = false;
        }
        updateSubmitState();
      });
      startElement.addEventListener("pointerdown", function (event) { beginTrimDrag("start", event); });
      endElement.addEventListener("pointerdown", function (event) { beginTrimDrag("end", event); });
      startElement.addEventListener("pointermove", moveTrimDrag);
      endElement.addEventListener("pointermove", moveTrimDrag);
      startElement.addEventListener("pointerup", endTrimDrag);
      endElement.addEventListener("pointerup", endTrimDrag);
      startElement.addEventListener("pointercancel", endTrimDrag);
      endElement.addEventListener("pointercancel", endTrimDrag);
      startElement.addEventListener("keydown", function (event) { changeTrimFromKey("start", event); });
      endElement.addEventListener("keydown", function (event) { changeTrimFromKey("end", event); });
      timelineElement.addEventListener("pointerdown", function (event) {
        if (event.target === startElement || event.target === endElement || event.button !== 0 || durationMs <= 0) return;
        videoElement.currentTime = trimValueFromPointer(event) / 1000;
      });
      annotateElement.addEventListener("click", function () {
        setAnnotationMode(!annotationMode);
        if (annotationMode) void requestFullscreen();
      });
      roiLayerElement.addEventListener("pointerdown", function (event) {
        if (!annotationMode || event.button !== 0) return;
        var point = normalizedPoint(event);
        if (!point) return;
        videoElement.pause();
        dragStart = point;
        pendingRegion = { x: point.x, y: point.y, width: 0, height: 0 };
        roiLayerElement.setPointerCapture(event.pointerId);
        showRegion(pendingRegion);
      });
      roiLayerElement.addEventListener("pointermove", function (event) {
        if (!dragStart) return;
        var point = normalizedPoint(event);
        if (!point) return;
        pendingRegion = {
          x: Math.min(dragStart.x, point.x),
          y: Math.min(dragStart.y, point.y),
          width: Math.abs(point.x - dragStart.x),
          height: Math.abs(point.y - dragStart.y)
        };
        showRegion(pendingRegion);
      });
      roiLayerElement.addEventListener("pointerup", finishRegion);
      roiLayerElement.addEventListener("pointercancel", clearPendingRegion);
      roiLayerElement.addEventListener("keydown", function (event) {
        if (!annotationMode) return;
        var result = adjustWidgetRegionFromKey(pendingRegion, event.key, event.shiftKey);
        if (!result.handled) return;
        event.preventDefault();
        if (!result.region) {
          clearAnnotationRegion();
          return;
        }
        videoElement.pause();
        pendingRegion = result.region;
        selectAnnotationRegion(pendingRegion);
      });
      instructionElement.addEventListener("input", updateAnnotationInstruction);
      submitEditElement.addEventListener("click", function () { void submitEdit(); });
      window.addEventListener("resize", function () {
        if (pendingRegion) showRegion(pendingRegion);
      });
      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          clearPollTimer();
          window.clearTimeout(previewRenewTimer);
          previewRenewTimer = undefined;
        } else if (Number.isFinite(previewExpiresAtMs) && previewExpiresAtMs <= Date.now() + 30000) {
          dispatchWidgetEvent({
            activeJobId: activeJobId,
            activeModel: activeModel,
            awaitingPreview: true,
            status: activeStatus,
            type: "job-received"
          });
          if (protocolReady || window.openai) void refresh(false);
          else pendingPreviewRetry = true;
        } else {
          schedulePreviewRenewal(previewExpiresAtMs);
          schedulePoll(0);        }
      });

      fallbackTimer = window.setTimeout(useOpenAiInitialResult, 1200);
      request("ui/initialize", {
        protocolVersion: protocolVersion,
        appInfo: { name: "pippit-video-editor", title: "Pippit video regeneration", version: "0.2.17" },
        appCapabilities: { availableDisplayModes: ["inline", "fullscreen"] }
      }).then(function (result) {
        dispatchWidgetEvent({ type: "protocol-ready" });
        window.clearTimeout(fallbackTimer);
        var capabilities = result && result.hostCapabilities && typeof result.hostCapabilities === "object"
          ? result.hostCapabilities
          : {};
        hostContext = result && result.hostContext && typeof result.hostContext === "object" ? result.hostContext : {};
        applyWidgetTheme();
        serverResourcesAvailable = Boolean(capabilities.serverResources);
        serverToolsAvailable = Boolean(capabilities.serverTools);
        post({ jsonrpc: "2.0", method: "ui/notifications/initialized" });
        if (!widgetToolTransportAvailable() && bootstrapResult) {
          latestResolutionComplete = true;
          renderBootstrapFallback(bootstrapResult);
        } else {
          resolveLatestBootstrap();
        }
        if (pendingPreviewRetry) {
          pendingPreviewRetry = false;
          if (activeJobId && activePreviewMedia && typeof activePreviewMedia.resource_uri === "string") {
            setPreview({ id: activeJobId }, activePreviewMedia);
          } else {
            void refresh(false);
          }
        }
        schedulePoll(0);
        if (typeof ResizeObserver === "function") {
          resizeObserver = new ResizeObserver(reportSize);
          resizeObserver.observe(document.body);
        }
        reportSize();
      }).catch(function () {
        useOpenAiInitialResult();
        if (!widgetToolTransportAvailable() && bootstrapResult) {
          latestResolutionComplete = true;
          renderBootstrapFallback(bootstrapResult);
        } else {
          resolveLatestBootstrap();
        }
        if (pendingPreviewRetry) {
          pendingPreviewRetry = false;
          if (
            localPreviewTransportAvailable() &&
            activeJobId &&
            activePreviewMedia &&
            typeof activePreviewMedia.resource_uri === "string"
          ) {
            setPreview({ id: activeJobId }, activePreviewMedia);
          } else if (previewLoading) {
            localPreviewFailed();
          }
        }
        schedulePoll(0);
      });
    }());
  </script>
</body>
</html>
